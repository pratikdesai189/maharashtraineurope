<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maharashtra in Europe | Coming Soon</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital@1&family=Yatra+One&display=swap" rel="stylesheet">
    <style>
        /* --- CSS: The Visual Strategy --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow: hidden; 
        }

        .coming-soon-container {
            height: 100%;
            position: relative; 
            
            /* CONTENT POSITIONING */
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: flex-end; 
            padding-top: 15vh; 
            padding-right: 8vw; 
            box-sizing: border-box;
            z-index: 1;
        }

        /* --- THE CINEMATIC ZOOMING BACKGROUND --- */
        .coming-soon-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('maharaj-silhouette.png.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            z-index: -1; 
            animation: slowZoom 25s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.12); }
        }

        /* --- Text Styling (Desktop Foreground) --- */
        .text-content {
            z-index: 10; 
            text-align: right; 
            max-width: 650px; 
        }

        h1 {
            font-size: 5rem; 
            font-weight: 700;
            margin: 0;
            color: #FFD700; 
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8), 0px 0px 15px rgba(0,0,0,0.4);
        }

        h2 {
            font-family: 'Yatra One', cursive; 
            font-size: 3.5rem; 
            font-weight: 400;
            margin: -10px 0 15px 0; 
            color: #FFD700; 
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
        }

        .tagline {
            font-family: 'Playfair Display', serif; 
            font-size: 1.8rem;
            font-style: italic; 
            margin: 5px 0 20px 0; 
            color: #FFFFFF; 
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9); 
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9); 
            margin-bottom: 40px; 
        }

        /* =========================================
           CRITICAL FIX: TRUE 3D THICK COIN MECHANICS
           ========================================= */
        .logo-container {
            display: flex;
            justify-content: flex-end; 
            width: 100%;
            perspective: 2000px; /* Increased perspective depth */
            -webkit-perspective: 2000px;
        }

        .coin {
            width: 200px;
            height: 200px;
            position: relative;
            
            /* CRUCIAL: Forces browser engine to handle children layers in 3D */
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            
            transform-origin: center center;
            animation: spinVertical 6s linear infinite; 
            filter: drop-shadow(0px 15px 25px rgba(0, 0, 0, 0.6));
        }

        /* Base rules for ALL stacked layers */
        .coin div {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-image: url('logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            
            /* Keeps 3D matrix alive deep into the nested DOM */
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* Front and Back Outer Face Rims */
        .coin .coin-front, .coin .coin-back {
            border: 6px solid #d4af37;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.65);
            box-sizing: border-box;
            background-color: #2b0000;
        }

        /* Front Face (Pulled 8px forward to make a deep 16px thick coin total) */
        .coin .coin-front {
            transform: translateZ(8px);
        }

        /* Back Face (Rotated and pushed 8px backward) */
        .coin .coin-back {
            transform: rotateY(180deg) translateZ(8px);
        }

        /* Dense 3D Slice Stack: Builds a completely solid rim wall. 
           Filters mimic lighting reflections off the metallic edge as it turns.
        */
        .coin .edge-1  { transform: translateZ(7px);   filter: brightness(0.95); }
        .coin .edge-2  { transform: translateZ(6px);   filter: brightness(0.90); }
        .coin .edge-3  { transform: translateZ(5px);   filter: brightness(0.85); }
        .coin .edge-4  { transform: translateZ(4px);   filter: brightness(0.80); }
        .coin .edge-5  { transform: translateZ(3px);   filter: brightness(0.75); }
        .coin .edge-6  { transform: translateZ(2px);   filter: brightness(0.70); }
        .coin .edge-7  { transform: translateZ(1px);   filter: brightness(0.65); }
        .coin .edge-8  { transform: translateZ(0px);   filter: brightness(0.60); } /* Center Line Shadow */
        .coin .edge-9  { transform: translateZ(-1px);  filter: brightness(0.65); }
        .coin .edge-10 { transform: translateZ(-2px);  filter: brightness(0.70); }
        .coin .edge-11 { transform: translateZ(-3px);  filter: brightness(0.75); }
        .coin .edge-12 { transform: translateZ(-4px);  filter: brightness(0.80); }
        .coin .edge-13 { transform: translateZ(-5px);  filter: brightness(0.85); }
        .coin .edge-14 { transform: translateZ(-6px);  filter: brightness(0.90); }
        .coin .edge-15 { transform: translateZ(-7px);  filter: brightness(0.95); }

        /* Smooth 360 Axis Spin */
        @keyframes spinVertical {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* =========================================
           MOBILE RESPONSIVENESS (Phones & Tablets) 
           ========================================= */
        @media (max-width: 768px) {
            .coming-soon-container {
                align-items: center; 
                padding-right: 5vw;
                padding-left: 5vw;
                padding-top: 10vh; 
            }

            .text-content {
                text-align: center; 
                background: rgba(0, 0, 0, 0.2); 
                padding: 20px;
                border-radius: 15px;
            }

            h1 { font-size: 3rem; }
            h2 { font-size: 2.2rem; }
            .tagline { font-size: 1.2rem; }
            p { font-size: 1rem; }

            .logo-container {
                justify-content: center;
            }

            .coin {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>

    <div class="coming-soon-container">
        <div class="text-content">
            <h1>Coming Soon...</h1>
            <h2>महाराष्ट्र इन युरोप</h2>
            <div class="tagline">"Where the Sahyadri meets the Alps"</div>
            <p>Building the definitive digital hub for Marathi expats across the continent. Secure your spot in the conversation.</p>
            
            <div class="logo-container">
                <div class="coin">
                    <div class="coin-front"></div>
                    
                    <div class="edge-1"></div>
                    <div class="edge-2"></div>
                    <div class="edge-3"></div>
                    <div class="edge-4"></div>
                    <div class="edge-5"></div>
                    <div class="edge-6"></div>
                    <div class="edge-7"></div>
                    <div class="edge-8"></div>
                    <div class="edge-9"></div>
                    <div class="edge-10"></div>
                    <div class="edge-11"></div>
                    <div class="edge-12"></div>
                    <div class="edge-13"></div>
                    <div class="edge-14"></div>
                    <div class="edge-15"></div>
                    
                    <div class="coin-back"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
